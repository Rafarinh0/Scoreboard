<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placar ao Vivo</title>
  <!-- socket.io client, loaded from CDN. Matches the 4.x server. -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
      text-align: center;
    }
    h1 { font-size: 1.3rem; font-weight: 600; }
    .controls { margin: 1rem 0; }
    input { padding: .4rem .6rem; font-size: 1rem; width: 6rem; text-align: center; }
    button { padding: .4rem .9rem; font-size: 1rem; cursor: pointer; }
    .status { font-size: .85rem; opacity: .7; margin-bottom: 1.5rem; }
    .board {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      font-size: 4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .team { font-size: .9rem; font-weight: 500; opacity: .7; }
    .side { display: flex; flex-direction: column; gap: .3rem; }
    .log {
      margin-top: 2rem;
      text-align: left;
      font-family: monospace;
      font-size: .8rem;
      max-height: 200px;
      overflow-y: auto;
      border-top: 1px solid rgba(128,128,128,.3);
      padding-top: .5rem;
    }
  </style>
</head>
<body>
  <h1>⚽ Placar ao Vivo</h1>

  <div class="controls">
    Partida: <input id="matchId" value="42" />
    <button id="subscribeBtn">Assistir</button>
  </div>
  <div class="status" id="status">desconectado</div>

  <div class="board">
    <div class="side"><span class="team">CASA</span><span id="home">0</span></div>
    <span>×</span>
    <div class="side"><span class="team">VISITANTE</span><span id="away">0</span></div>
  </div>

  <div class="log" id="log"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const socket = io('http://localhost:3000');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      $('log').prepend(line);
    }

    function subscribe() {
      const matchId = $('matchId').value.trim();
      socket.emit('subscribe', matchId);
      log(`assinando partida ${matchId}`);
    }

    socket.on('connect', () => {
      $('status').textContent = `conectado (id ${socket.id})`;
      subscribe();
    });

    socket.on('disconnect', () => {
      $('status').textContent = 'desconectado';
    });

    // The server PUSHES this whenever the score changes.
    socket.on('score', (score) => {
      $('home').textContent = score.home;
      $('away').textContent = score.away;
      log(`placar recebido: ${score.home}-${score.away}`);
    });

    $('subscribeBtn').addEventListener('click', subscribe);
  </script>
</body>
</html>
